name: CD - Build and Publish Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build-and-upload:
        name: Build for ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      archive: time-tracker-tui-linux-x86_64.tar.gz
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      archive: time-tracker-tui-windows-x86_64.zip
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      archive: time-tracker-tui-macos-aarch64.tar.gz

        steps:
            - name: Download source code
              uses: actions/checkout@v4

            - name: Install Rust Toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Configure Cargo cache
              uses: swatinem/rust-cache@v2

            - name: Build binary in Release mode
              run: cargo build --release --target ${{ matrix.target }}

            - name: Package binary (Linux / macOS)
              if: matrix.os != 'windows-latest'
              shell: bash
              run: |
                  cd target/${{ matrix.target }}/release
                  tar -czvf ../../../${{ matrix.archive }} time_tracker

            - name: Package binary (Windows)
              if: matrix.os == 'windows-latest'
              shell: bash
              run: |
                  cd target/${{ matrix.target }}/release
                  7z a ../../../${{ matrix.archive }} time_tracker.exe

            - name: Upload to GitHub Releases
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ matrix.archive }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
